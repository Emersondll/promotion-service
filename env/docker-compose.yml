version: '2.1'
services:
    rabbitmq:
       image: rabbitmq:3-management
       ports:
         - 15672:15672
         - 5672:5672
       container_name: rabbitmq
       environment:
         - RABBITMQ_HOST=rabbitmq
         - RABBITMQ_USER=guest
         - RABBITMQ_PASS=guest
         - RABBITMQ_DEFAULT_VHOST=promotion_dev
         - HEALTH_CHECK_CACHE=0
    mongodb:
       image: mongo:3.6.1
       container_name: "mongodb"
       environment:
         - MONGO_DATA_DIR=/data/db
         - MONGO_LOG_DIR=/dev/null
       ports:
        - 27017:27017
       command: mongod
networks:
    default:
       external:
         name: promotion-network
