logging:
  newRelic:
    appender:
      enabled: false

spring:
  application:
    name: promotion-service-ms
  data:
    mongodb:
      uri: mongodb://localhost:27017
      database: Promotion
    web:
      pageable:
        default-page-size: 50
        max-page-size: 50

enableJwtValidation: false

featuresToggle:
  supportedCountries: AR,BE,BR,CA,CL,CO,DE,DO,EC,ES,GB,HN,ID,MX,NL,PA,PE,PH,PY,SV,TH,TZ,US,UY,ZA

database:
  maxQueryTimeout: 10000

parameters:
  vendor-ids-max-size: 50
  promotion-platform-ids-max-size: 50

nonOfficialSupportedLanguages: en-ES