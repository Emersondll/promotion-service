openapi: 3.0.3
info:
  title: Promotion Service V1, V2, V3
  description: '"REST API for AB-Inbev Promotion Service Microservice"'
  license:
    name: Anheuser-Busch InBev © 2021
  version: 2.0.1-SNAPSHOT
servers:
  - url: https://services-dev.bees-platform.dev/api/promotion-service/
    description: dev
  - url: https://services-uat.bees-platform.dev/api/promotion-service/
    description: uat
  - url: https://services-sit.bees-platform.dev/api/promotion-service/
    description: sit
security:
  - Authorization: []
tags:
  - name: Promotion Service API
    description: ABI B2B global promotion service.
paths:
  /:
    get:
      tags:
        - Single-Vendor
      summary: Promotion Information
      description: Retrieves the promotion detailed information
      operationId: getPromotionsUsingGET
      parameters:
        - name: accountId
          in: query
          description: Point of consumption unique identifier
          schema:
            type: string
        - name: updatedSince
          in: query
          description: A filter to retrieve just promotions that were updated after provided date
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            format: int32
            default: 0
        - name: pageSize
          in: query
          description: Page size
          schema:
            type: integer
            format: int32
            default: 50
        - name: includeDisabled
          in: query
          description: Include disabled promotions
          schema:
            type: boolean
            default: false
        - name: requestTraceId
          in: header
          description: Cross transaction unique ID. Used to track the request across systems
          required: true
          schema:
            type: string
        - name: country
          in: header
          description: Country/region. ISO 3166 alpha-2 country code
          required: true
          schema:
            type: string
        - schema:
            type: array
            items:
              type: string
            enum:
              - STEPPED_DISCOUNT
              - STEPPED_FREE_GOOD
              - DISCOUNT
              - FREE_GOOD
              - FLEXIBLE_DISCOUNT
          in: query
          name: types
          description: A filter to retrieve just promotions with specific types
        - schema:
            type: string
          in: query
          name: sku
          description: A filter to retrieve just promotions with specific sku
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAllPromotionsResult'
        '400':
          description: Bad Request
          content: {}
        '401':
          description: Unauthorized
          content: {}
        '403':
          description: Forbidden
          content: {}
        '404':
          description: Not Found
          content: {}
  /accounts:
    get:
      tags:
        - Single-Vendor
      summary: Promotion Information grouped by account
      description: Retrieves the promotion detailed information grouped by account
      operationId: getPromotionsByAccountUsingGET
      parameters:
        - name: accounts
          in: query
          description: List of accounts
          style: form
          explode: true
          schema:
            type: array
            items:
              type: string
        - name: updatedSince
          in: query
          description: A filter to retrieve just promotions that were updated after provided date
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          description: Page number
          schema:
            type: integer
            format: int32
            default: 0
        - name: pageSize
          in: query
          description: Page size
          schema:
            type: integer
            format: int32
            default: 50
        - name: includeDisabled
          in: query
          description: Include disabled promotions
          schema:
            type: boolean
            default: false
        - name: requestTraceId
          in: header
          description: Cross transaction unique ID. Used to track the request across systems
          required: true
          schema:
            type: string
        - name: country
          in: header
          description: Country/region. ISO 3166 alpha-2 country code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetPromotionsGroupedByAccountVO'
        '400':
          description: Bad Request
          content: {}
        '401':
          description: Unauthorized
          content: {}
        '403':
          description: Forbidden
          content: {}
        '404':
          description: Not Found
          content: {}
      deprecated: true
  /{accountId}/{promotionId}:
    get:
      tags:
        - Single-Vendor
      summary: Promotion Information filtered by accountId and promotionId
      description: Retrieves promotion detailed information filtered by accountId and promotionId
      operationId: getByAccountIdAndPromotionIdUsingGET
      parameters:
        - name: accountId
          in: path
          description: Account unique identifier
          required: true
          schema:
            type: string
        - name: promotionId
          in: path
          description: PromotionId unique identifier
          required: true
          schema:
            type: string
        - name: requestTraceId
          in: header
          description: Cross transaction unique ID. Used to track the request across systems
          required: true
          schema:
            type: string
        - name: country
          in: header
          description: Country/region. ISO 3166 alpha-2 country code
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountPromotionVO'
        '400':
          description: Bad Request
          content: {}
        '401':
          description: Unauthorized
          content: {}
        '403':
          description: Forbidden
          content: {}
        '404':
          description: Not Found
          content: {}
      deprecated: true
  /promotions:
    get:
      summary: GET /promotions
      tags:
        - Multi-Vendor
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  promotions:
                    type: array
                    items:
                      $ref: '#/components/schemas/PromotionMultivendorResponse'
                  pagination:
                    $ref: '#/components/schemas/Pagination'
              examples:
                example-1:
                  value:
                    promotions:
                      - vendorPromotionId: PROMOTION001
                        title: Buy 3 get 1 free
                        description: Buy 10, get 12 - Buy 12, get 16 or discounts 10% off for all beers.
                        type: STEPPED_DISCOUNT
                        budget: 100.5
                        startDate: '2020-01-20T18:00:00.000Z'
                        endDate: '2020-01-20T18:00:00.000Z'
                        image: http://example.com
                        quantityLimit: 10
                        vendorItemIds:
                          - '12345'
                          - '54321'
                        updatedAt: '2020-01-20T18:00:00.000Z'
                        id: 497f6eca-6276-4993-bfeb-53cbbbba6f08
                    pagination:
                      page: 4
                      size: 20
                      totalPages: 5
        '403':
          description: Forbidden
        '404':
          description: Not Found
      operationId: get-PromotionsV1
      description: Retrieve a list of valid promotions.
      parameters:
        - schema:
            type: string
          in: header
          name: country
          description: Country/region. ISO 3166 alpha-2 country code.
          required: true
        - schema:
            type: string
          in: header
          name: requestTraceId
          description: Cross transaction unique ID. Used to track the request across systems.
          required: true
        - schema:
            type: string
          in: query
          name: vendorId
          description: Vendor Id to have the promotions returned.
          required: true
        - schema:
            type: string
          in: query
          name: vendorAccountId
          description: Vendor Account Id to have the promotions returned.
          required: true
        - schema:
            type: string
          example: vendorPromotionIds=VNPROMO123,VNPROMO456
          in: query
          name: vendorPromotionIds
          description: Vendor Promotion Ids to have the promotions returned.
        - schema:
            type: string
          example: vendorItemIds=ITEM123,ITEM456
          in: query
          name: vendorItemIds
          description: Vendor Item Ids to have the promotions returned.
        - schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          in: query
          name: page
          description: Number of the current page being returned. The first page is number zero.
        - schema:
            type: integer
            format: int32
            default: 1000
          in: query
          name: pageSize
          description: Number of elements being returned per page.
        - schema:
            type: string
            items:
              type: string
              enum:
                - STEPPED_DISCOUNT
                - STEPPED_FREE_GOOD
                - DISCOUNT
                - FREE_GOOD
                - FLEXIBLE_DISCOUNT
          example: types=STEPPED_DISCOUNT, FLEXIBLE_DISCOUNT
          in: query
          name: types
          description: The types to have the promotions returned.
        - schema:
            type: string
          in: header
          name: accept-language
          description: Information about the response language preferences (eg. en-US represents English as spoken in the United States). More details about the locale on https://www.oracle.com/java/technologies/javase/jdk11-suported-locales.html
    parameters: []
  /v2/promotions:
    get:
      summary: GET V2/promotions
      tags:
        - Multi-Vendor
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  promotions:
                    type: array
                    items:
                      $ref: '#/components/schemas/PromotionMultivendorV2Response'
                  pagination:
                    $ref: '#/components/schemas/PaginationV2'
              examples:
                example-1:
                  value:
                    promotions:
                      - promotionId: 3eaf888b-516c-4eac-ac00-1312640986a2
                        vendorPromotionId: PROMOTION001
                        vendorId: 3c8023c1-8d12-4f64-b11d-5f3172abf3ab
                        title: Buy 3 get 1 free
                        description: Buy 10, get 12 - Buy 12, get 16 or discounts 10% off for all beers.
                        type: STEPPED_DISCOUNT
                        startDate: '2020-01-20T18:00:00.000Z'
                        endDate: '2020-01-20T18:00:00.000Z'
                        image: http://example.com
                        updatedAt: '2020-01-20T18:00:00.000Z'
                    pagination:
                      page: 4
                      size: 20
                      totalElements: 100
                      totalPages: 5
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
      operationId: get-Promotions
      description: This endpoint retrieves a list of valid promotions bringing only promotion metadata without account association and list of vendorItemIds, to have account association and the vendorItemIds it's necessary to call deals MS.
      parameters:
        - schema:
            type: string
          in: header
          name: country
          description: Country/region. ISO 3166 alpha-2 country code.
          required: true
        - schema:
            type: string
          in: header
          name: requestTraceId
          description: Cross transaction unique ID. Used to track the request across systems.
          required: true
        - schema:
            type: string
            example: vendorId=3c8023c1-8d12-4f64-b11d-5f3172abf3ab
          in: query
          name: vendorId
          description: Vendor Id to have the promotions returned.
        - schema:
            type: string
          example: vendorPromotionIds=VNPROMO123,VNPROMO456
          in: query
          name: vendorPromotionIds
          description: Vendor Promotion Ids to have the promotions returned.
        - schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          in: query
          name: page
          description: Number of the current page being returned. The first page is number zero.
        - schema:
            type: integer
            format: int32
            default: 100
          in: query
          name: pageSize
          description: Number of elements being returned per page.
        - schema:
            type: string
            items:
              type: string
              enum:
                - types=STEPPED_DISCOUNT
                - STEPPED_FREE_GOOD
                - DISCOUNT
                - FREE_GOOD
                - FLEXIBLE_DISCOUNT
          example: types=STEPPED_DISCOUNT
          in: query
          name: types
          description: The types to have the promotions returned.
        - schema:
            type: string
          in: header
          name: accept-language
          description: Information about the response language preferences (eg. en-US represents English as spoken in the United States). More details about the locale on https://www.oracle.com/java/technologies/javase/jdk11-suported-locales.html
        - schema:
            type: string
            items:
              type: string
          example: promotionIds=09f9e275-8a0a-3496-8586-3e81d0402b7a
          in: query
          name: promotionIds
          description: The promotion unique id to have the promotions returned.
        - schema:
            type: string
            example: BRAHMA
          in: query
          name: query
          description: Used to filter by word on title and description of promotions.
        - schema:
            type: boolean
            default: false
          in: query
          name: ignoreStartDate
          description: Used to ignore the startDate filter of promotions.
    parameters: []
  /v3/promotions:
    get:
      summary: GET V3/promotions
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  promotions:
                    type: array
                    items:
                      $ref: '#/components/schemas/PromotionMarketplaceResponse'
                  pagination:
                    $ref: '#/components/schemas/PaginationMarketplace'
              examples:
                example-1:
                  value:
                    promotions:
                      - platformUniqueIds:
                          promotionId: string
                          promotionPlatformId: string
                        vendorUniqueIds:
                          vendorId: string
                          vendorPromotionId: string
                        title: Buy 3 get 1 free
                        description: Buy 10, get 12 - Buy 12, get 16 or discounts 10% off for all beers.
                        type: STEPPED_DISCOUNT
                        startDate: '2020-01-20T18:00:00.000Z'
                        endDate: '2020-01-20T18:00:00.000Z'
                        image: http://example.com
                    pagination:
                      page: 4
                      hasNext: false
        '201':
          description: Created
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Internal Server Error
      operationId: get-PromotionsV3
      description: This endpoint retrieves a list of valid promotions bringing only promotion metadata without account association and list of vendorItemIds, to have account association and the vendorItemIds it's necessary to call deals MS. It is obrigatory to send a list of vendorIds OR a list of promotionPlatformIds.
      parameters:
        - schema:
            type: string
          in: header
          name: country
          description: Country/region. ISO 3166 alpha-2 country code.
          required: true
        - schema:
            type: string
          in: header
          name: requestTraceId
          description: Cross transaction unique ID. Used to track the request across system.
          required: true
        - $ref: '#/components/parameters/promotionPlatformIds'
        - schema:
            type: string
          example: vendorIds=VENDOR1,VENDOR2
          in: query
          name: vendorIds
          description: VendorIds to have the promotions returned.
          required: true
        - schema:
            type: integer
            format: int32
            minimum: 0
            default: 0
          in: query
          name: page
          description: Number of the current page being returned. The first page is number zero.
        - schema:
            type: integer
            format: int32
            default: 50
          in: query
          name: pageSize
          description: Number of elements being returned per page. Max size is 50.
        - schema:
            type: string
            items:
              type: string
            enum:
              - types=STEPPED_DISCOUNT
              - STEPPED_FREE_GOOD
              - DISCOUNT
              - FREE_GOOD
              - FLEXIBLE_DISCOUNT
          example: types=STEPPED_DISCOUNT
          in: query
          name: types
          description: The types to have the promotions returned.
        - schema:
            type: string
          in: header
          name: accept-language
          description: Information about the response language preferences (eg. en-US represents English as spoken in the United States). More details about the locale on https://www.oracle.com/java/technologies/javase/jdk11-suported-locales.html
        - schema:
            type: string
          example: BRAHMA
          in: query
          name: query
          description: Used to filter by word on title and description of promotions.
        - schema:
            type: boolean
            default: false
          in: query
          name: ignoreStartDate
          description: Used to ignore the startDate filter of promotions.
      tags:
        - Marketplace
    parameters: []
components:
  schemas:
    AccountPromotionVO:
      title: AccountPromotionVO
      type: object
      properties:
        accountId:
          type: string
          description: Account ID from external Source.
          example: '00001000004'
        budget:
          type: number
          description: Promotion budget.
          example: 100.5
        description:
          type: string
          description: The complete description of the promotion. It describes the promotion itself, about how the promotion works.
          example: Buy 10, get 12 - Buy 12, get 16” or discounts "10% off for all beers".
        endDate:
          type: string
          description: Promotion deactivation date.
          example: '2020-01-20T18:00:00.000Z'
        id:
          type: string
          description: Unique identifier for the promotion.
          example: '1'
        image:
          type: string
          description: Image used as background of the promotion.
          example: https://www.socioscerveceria.com.do/media/catalog/product//b/a/barcelo_dark_series_350_ml_-_unidad_1_botella_dar_siri_.png
        internalId:
          type: string
          description: Internal ID from external Source.
          example: '1'
        promotionId:
          type: string
          description: Promotion ID from external Source.
          example: PROMOTION001
        promotionsRanking:
          type: integer
          description: Promotion ranking of the product.
          format: int32
          example: 100
        quantityLimit:
          type: integer
          description: Integer of the consumption limit of the promotion.
          format: int32
          example: 10
        score:
          type: number
          description: Promotion Score.
          example: 100
        skus:
          type: array
          description: The list of sku ID that are part of the promotion.
          example:
            - '12345'
            - '54321'
          items:
            type: string
        title:
          type: string
          description: The promotion title. The label displayed on the promotion list.
          example: Buy 3 get 1 free
        type:
          type: string
          description: The type of the promotion.
          example: FLEXIBLE_DISCOUNT
          enum:
            - STEPPED_DISCOUNT
            - STEPPED_FREE_GOOD
            - DISCOUNT
            - FREE_GOOD
            - FLEXIBLE_DISCOUNT
        updatedAt:
          type: string
          description: Date that the promotion was updated.
          example: '2020-01-20T18:00:00.000Z'
    GetAllPromotionsResult:
      title: GetAllPromotionsResult
      type: object
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
        promotions:
          type: array
          items:
            $ref: '#/components/schemas/PromotionResponse'
    GetPromotionsGroupedByAccountVO:
      title: GetPromotionsGroupedByAccountVO
      type: object
      properties:
        accounts:
          type: array
          items:
            $ref: '#/components/schemas/PromotionResponseListByAccount'
        pagination:
          $ref: '#/components/schemas/Pagination'
    PromotionAccountGroup:
      title: PromotionAccountGroup
      required:
        - accountGroupId
        - accounts
      type: object
      properties:
        accountGroupId:
          type: string
          description: The account group ID. This ID will be used to link the account given to a promotion with this account group.
        accounts:
          type: array
          example:
            - '11111'
            - '22222'
            - '33333'
          items:
            type: string
    PromotionFreeGoodGroup:
      title: PromotionFreeGoodGroup
      required:
        - freeGoodGroupId
        - skus
      type: object
      properties:
        freeGoodGroupId:
          type: string
          description: The free good group ID. This ID will be used to link the sku to be available as a free good to a promotion with this free good group.
        skus:
          type: array
          example:
            - SKU001
            - SKU002
            - SKU003
          items:
            type: string
    PromotionResponse:
      title: PromotionResponse
      type: object
      properties:
        budget:
          type: number
          description: Promotion budget.
          example: 100.5
        description:
          type: string
          description: The complete description of the promotion. It describes the promotion itself, about how the promotion works.
          example: Buy 10, get 12 - Buy 12, get 16” or discounts "10% off for all beers".
        endDate:
          type: string
          description: Promotion deactivation date.
          example: '2020-01-20T18:00:00.000Z'
        id:
          type: string
          description: Unique identifier for the promotion.
          example: '1'
        image:
          type: string
          description: Image used as background of the promotion.
          example: https://www.socioscerveceria.com.do/media/catalog/product//b/a/barcelo_dark_series_350_ml_-_unidad_1_botella_dar_siri_.png
        internalId:
          type: string
          description: Internal ID from external Source.
          example: '1'
        promotionId:
          type: string
          description: Promotion ID from external Source.
          example: PROMOTION001
        promotionsRanking:
          type: integer
          description: Promotion ranking of the product.
          format: int32
          example: 100
        quantityLimit:
          type: integer
          description: Integer of the consumption limit of the promotion.
          format: int32
          example: 10
        score:
          type: number
          description: Promotion Score.
          example: 100
        skus:
          type: array
          description: The list of sku ID that are part of the promotion.
          example:
            - '12345'
            - '54321'
          items:
            type: string
        title:
          type: string
          description: The promotion title. The label displayed on the promotion list.
          example: Buy 3 get 1 free
        type:
          type: string
          description: The type of the promotion.
          example: STEPPED_DISCOUNT
          enum:
            - STEPPED_DISCOUNT
            - STEPPED_FREE_GOOD
            - DISCOUNT
            - FREE_GOOD
            - FLEXIBLE_DISCOUNT
        updatedAt:
          type: string
          description: Date that the promotion was updated.
          example: '2020-01-20T18:00:00.000Z'
      x-examples: {}
      description: ''
    PromotionMultivendorResponse:
      title: PromotionMultivendorResponse
      type: object
      x-examples:
        example-1:
          vendorPromotionId: PROMOTION001
          title: Buy 3 get 1 free
          description: Buy 10, get 12 - Buy 12, get 16 or discounts 10% off for all beers.
          type: STEPPED_DISCOUNT
          budget: 100.5
          startDate: '2020-01-20T18:00:00.000Z'
          endDate: '2020-01-20T18:00:00.000Z'
          image: http://example.com
          quantityLimit: 10
          vendorItemIds:
            - '12345'
            - '54321'
          updatedAt: '2020-01-20T18:00:00.000Z'
          id: 497f6eca-6276-4993-bfeb-53cbbbba6f08
      description: ''
      properties:
        vendorPromotionId:
          type: string
          description: Promotion ID from external Source.
          example: PROMOTION001
        title:
          type: string
          description: The promotion title. The label displayed on the promotion list.
          example: Buy 3 get 1 free
        description:
          type: string
          description: The complete description of the promotion. It describes the promotion itself, about how the promotion works.
          example: Buy 10, get 12 - Buy 12, get 16 or discounts 10% off for all beers.
        type:
          type: string
          description: The type of the promotion.
          example: STEPPED_DISCOUNT
          enum:
            - STEPPED_DISCOUNT
            - STEPPED_FREE_GOOD
            - DISCOUNT
            - FREE_GOOD
            - FLEXIBLE_DISCOUNT
        budget:
          type: number
          description: Promotion budget.
          example: 100.5
        startDate:
          type: string
          description: Promotion activation date.
          example: '2020-01-20T18:00:00.000Z'
          format: date-time
        endDate:
          type: string
          description: Promotion deactivation date.
          example: '2020-01-20T18:00:00.000Z'
          format: date-time
        image:
          type: string
          description: Image used as background of the promotion.
          format: uri
        quantityLimit:
          type: integer
          description: Integer of the consumption limit of the promotion.
          format: int32
          example: 10
        vendorItemIds:
          type: array
          description: The list of vendor item ids that are part of the promotion.
          example:
            - '12345'
            - '54321'
          items:
            type: string
        updatedAt:
          type: string
          description: Date that the promotion was updated.
          example: '2020-01-20T18:00:00.000Z'
          format: date-time
        id:
          type: string
          format: uuid
          description: Promotion internal id.
      required:
        - vendorPromotionId
        - title
        - type
        - startDate
        - endDate
        - vendorItemIds
    PromotionResponseListByAccount:
      title: PromotionResponseListByAccount
      type: object
      properties:
        accountId:
          type: string
        promotions:
          type: array
          items:
            $ref: '#/components/schemas/PromotionResponse'
    PromotionScore:
      title: PromotionScore
      required:
        - promotionId
        - score
      type: object
      properties:
        promotionId:
          type: string
          description: Promotion ID.
        score:
          type: number
          description: The promotion score. Integer value that represents a rank value for sorting.
    PromotionSkuGroup:
      title: PromotionSkuGroup
      required:
        - skuGroupId
        - skus
      type: object
      properties:
        skuGroupId:
          type: string
