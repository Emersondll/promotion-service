    parameters: []
components:
  schemas:
    Promotion:
      title: Promotion
      required:
        - accountGroupIds
        - budget
        - description
        - id
        - score
        - skuGroupIds
        - title
        - type
      type: object
      properties:
        accountGroupIds:
          type: array
          description: The account groups of this promotion. This will link an account group to this promotion. With this information the middleware can identify for which accounts this promotion is available. (this field cannot contain whitespaces)
          example:
            - '12345'
            - '54321'
          items:
            type: string
        budget:
          type: number
          description: The promotion budget
        description:
          maxLength: 20000
          minLength: 0
          type: string
          description: The complete description of the promotion. It describes the promotion itself, about how the promotion works.
          example: Buy 10, get 12 - Buy 12, get 16” or discounts "10% off for all beers".
        endDate:
          type: string
          description: Day until which the promotion will become active. Needs to be > than Start date. It should be in UTC timezone. https://en.wikipedia.org/wiki/ISO_8601
          example: '2019-03-31T23:59:59.999Z'
        freeGoodGroupIds:
          type: array
          description: The free good groups of this promotion. This will link this promotion to the sku’s that will be free goodies when affected by this promotion. This field is required when promotion type is FREE_GOOD or STEPPED_FREE_GOOD. (this field cannot contain whitespaces)
          example:
            - '12345'
            - '54321'
          items:
            type: string
        hidden:
          type: boolean
          description: Define if the promotion will be available
          example: false
        id:
          maxLength: 255
          minLength: 0
          type: string
          description: Unique identifier for the promotion. (this field cannot contain whitespaces)
          example: '1'
        promotionId:
          type: string
          description: Promotion Id. (this field cannot contain whitespaces)
          example: Becks01
        promotionsRanking:
          maximum: 100
          exclusiveMaximum: false
          minimum: 1
          exclusiveMinimum: false
          type: integer
          description: The ranking of this promotion. This will link a ranking to this promotion. with this information the middleware can identity the ranking position of this promotion.
          format: int32
          example: 100
        quantityLimit:
          type: integer
          description: 'Quantity Limit of freegoods '
          format: int32
          example: 2
        score:
          type: number
          description: The promotion score. This decimal value represents a rank value for promotion on sort order
        skuGroupIds:
          type: array
          description: The sku groups of this promotion. This will link this promotion to the sku's affected by this promotion. with this information the middleware can identity with sku's this promotion have.
          example:
            - '12345'
            - '54321'
          items:
            type: string
        startDate:
          type: string
          description: Day as of which the promotion will become active. It should be in UTC timezone. https://en.wikipedia.org/wiki/ISO_8601
          example: '2019-03-04T00:00:00.000Z'
        title:
          maxLength: 255
          minLength: 0
          type: string
          description: The promotion title. The label displayed on the promotion list.
          example: Buy 3 get 1 free
        type:
          type: string
          description: 'The promotion type that can be one of the following: DISCOUNT, FREE_GOOD, STEPPED_DISCOUNT, STEPPED_FREE_GOOD and FLEXIBLE_DISCOUNT.'
          example: STEPPED_DISCOUNT
          enum:
            - STEPPED_DISCOUNT
            - STEPPED_FREE_GOOD
            - DISCOUNT
            - FREE_GOOD
            - FLEXIBLE_DISCOUNT
    PromotionAccountGroup:
      title: PromotionAccountGroup
      required:
        - accountGroupId
        - accounts
      type: object
      properties:
        accountGroupId:
          maxLength: 255
          minLength: 0
          type: string
          description: The account group ID. This ID will be used to link the account given to a promotion with this account group. (this field cannot contain whitespaces)
        accounts:
          type: array
          description: This field cannot contain whitespaces
          example:
            - '11111'
            - '222222'
            - '333333'
          items:
            type: string
    PromotionFreeGoodGroup:
      title: PromotionFreeGoodGroup
      required:
        - freeGoodGroupId
        - skus
      type: object
      properties:
        freeGoodGroupId:
          maxLength: 255
          minLength: 0
          type: string
          description: The free good group ID. This ID will be used to link the sku to be available as a free good to a promotion with this free good group. (This field cannot contain whitespaces)
        skus:
          type: array
          example:
            - SKU001
            - SKU002
            - SKU003
          items:
            type: string
    PromotionScore:
      title: PromotionScore
      required:
        - promotionId
        - score
      type: object
      properties:
        promotionId:
          maxLength: 255
          minLength: 0
          type: string
          description: Promotion ID. (This field cannot contain whitespaces)
        score:
          type: number
          description: The promotion score, integer value that represents a rank value for sorting.
    PromotionScoreByAccount:
      title: PromotionScoreByAccount
      required:
        - accountId
        - promotions
      type: object
      properties:
        accountId:
          maxLength: 255
          minLength: 0
          type: string
          description: The account ID. This ID will be used to link the promotion score with a specific account. (This field cannot contain whitespaces)
        promotions:
          type: array
