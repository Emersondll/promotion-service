version: '2.1'
services:
    rabbitmq:
        image: rabbitmq:3.6-management-alpine
        ports:
          - "15672:15672"
          - "5672:5672"
        container_name: rabbitmq
        healthcheck:
          test: ["CMD-SHELL", "nc -z localhost 15672"]
          interval: 5s
          timeout: 5s
          retries: 5

    relay:
        image: promotion-relay-service:latest
        environment:
          - SPRING_PROFILES_ACTIVE=local
          - RABBIT_MQ_HOST=rabbitmq
        ports:
          - "8085:8080"
        healthcheck:
          test: ["CMD-SHELL", "nc -z localhost 8085"]
          interval: 5s
          timeout: 5s
          retries: 5
        depends_on:
          "rabbitmq":
              condition: service_healthy