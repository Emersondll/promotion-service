server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        enabled-by-default: false
  health:
    rabbit:
      enabled: true
    mongo:
      enabled: true
    probes:
      enabled: true
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  endpoint:
    health:
      show-components: never
      show-details: never
      enabled: true
      probes:
        enabled: true
      group:
        liveness:
          include: livenessState, mongo, rabbit
        readiness:
          include: readinessState, mongo, rabbit

log:
  appender: ${LOG_APPENDER}
  
logging:
  level:
    ROOT: ${LOG_ROOT_LEVEL:INFO}
  newRelic:
    appender:
      enabled: ${NEW_RELIC_APPENDER_ENABLED:true}

spring:
  application:
    name: promotion-consumer
  data:
    mongodb:
      uri: ${ATLAS_DB_CONNECTION}
      database: ${ATLAS_DB_DATABASE:Promotion}
  kafka:
    feedBackTopic: ${KAFKA_FEEDBACK_LAYER_TOPIC:feedback-layer}
    feedBackPartitions: ${KAFKA_FEEDBACK_LAYER_TOPIC_PARTITIONS:3}
  feedback:
    layer:
      cache:
        heapSize: ${FEEDBACK_LAYER_HEAP_SIZE:2000}
        ttlSeconds: ${FEEDBACK_LAYER_TTL_SEC:60}
      countries: ${FEEDBACK_LAYER_SUPPORTED_COUNTRIES:}

rabbitmq:
  promotions:
    host: ${RABBIT_MQ_HOST}
    port: ${RABBIT_MQ_PORT}
    username: ${RABBIT_MQ_USER_NAME}
    password: ${RABBIT_MQ_PASSWORD}
    virtual-host: ${RABBIT_MQ_VIRTUAL_HOST}
    ssl:
      enabled: ${RABBITMQ_PROMOTIONS_SSL_ENABLED}
      algorithm: ${RABBITMQ_PROMOTIONS_SSL_VERSION}
      verify-hostname: false
    listener:
      simple:
        concurrency: ${RABBIT_MQ_LISTENER_CONCURRENCY}
        max-concurrency: ${RABBIT_MQ_LISTENER_MAX_CONCURRENCY}
        default-requeue-rejected: false
        auto-startup: false
        prefetch: ${RABBIT_MQ_LISTENER_PREFETCH}
        retry:
          enabled: true
          initial-interval: 5000 #5 seconds
          max-attempts: ${RABBIT_MQ_LISTENER_RETRY_MAX_ATTEMPTS}
          max-interval: 5000 #5 seconds
          multiplier: 1

