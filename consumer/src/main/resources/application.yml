feedback-layer-eventhub-properties:
  enabled: ${EVENTHUB_ENABLED:false}
  kafkaProperties:
    bootstrap-servers: ${EVENTHUB_HOSTNAME:localhost}:9093
    properties:
      auto.create.topics.enable: false
      batch.size: 65536
      linger.ms: 100
      retries: 3
      retry.backoff.ms: 1000 #To run locally without issues, it is necessary to remove the following three lines.
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required   username='${EVENTHUB_BROKER_USER}' password='${EVENTHUB_BROKER_PASSWORD}';
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
